  <!-- nanostores — plain script (executes before module scripts, intentional) -->
  <script>
  (function(global) {
    function atom(initial) {
      let value = initial;
      const listeners = [];
      const store = {
        get() { return value; },
        set(next) { value = next; listeners.forEach(fn => fn(value)); },
        subscribe(fn) {
          listeners.push(fn); fn(value);
          return () => { const i = listeners.indexOf(fn); if (i > -1) listeners.splice(i, 1); };
        }
      };
      return store;
    }
    function computed(deps, fn) {
      const sources = Array.isArray(deps) ? deps : [deps];
      let value = fn(...sources.map(s => s.get()));
      const listeners = [];
      const recompute = () => { value = fn(...sources.map(s => s.get())); listeners.forEach(f => f(value)); };
      sources.forEach(s => s.subscribe(() => recompute()));
      return {
        get() { return value; },
        subscribe(fn) {
          listeners.push(fn); fn(value);
          return () => { const i = listeners.indexOf(fn); if (i > -1) listeners.splice(i, 1); };
        }
      };
    }
    global.nanostores = { atom, computed };
  })(window);
  </script>

<script type="module">
// ─────────────────────────────────────────────────────────────────────────────
// nanostores (set up by plain script before this module runs)
// ─────────────────────────────────────────────────────────────────────────────
const { atom, computed } = window.nanostores;

// ─────────────────────────────────────────────────────────────────────────────
// CONFIG
// ─────────────────────────────────────────────────────────────────────────────
const AGOL_CLIENT_ID    = "tS3sgaCh7cedVjCu";
const AGOL_PORTAL       = "https://wsrb.maps.arcgis.com/";
const STATIONS_URL      = "https://services8.arcgis.com/e0kWqyF74glFc4lT/arcgis/rest/services/Fire_Stations/FeatureServer/0";
const DRIVE_MILE_URL    = "https://services8.arcgis.com/e0kWqyF74glFc4lT/arcgis/rest/services/Drive_Mile_Disks/FeatureServer/1";
const FPD_URL           = "https://services8.arcgis.com/e0kWqyF74glFc4lT/arcgis/rest/services/FPD_Boundaries/FeatureServer/0";
const USERNAMES_ITEM_ID  = "a634dbad39de45ffb555381018c64892";
const HYDRANT_BUF_URL    = "https://services8.arcgis.com/e0kWqyF74glFc4lT/arcgis/rest/services/Hydrant_Buffers_1000_Feet/FeatureServer/2";
const sqlQuote = s => `'${s.replace(/'/g, "''")}'`;

// ─────────────────────────────────────────────────────────────────────────────
// IMPORTS — $arcgis.import() replaces AMD require()
// ─────────────────────────────────────────────────────────────────────────────
const [
  FeatureLayer,
  GraphicsLayer,
  Graphic,
  LabelClass,
  unionOperator,
  esriId,
  OAuthInfo,
] = await $arcgis.import([
  "@arcgis/core/layers/FeatureLayer.js",
  "@arcgis/core/layers/GraphicsLayer.js",
  "@arcgis/core/Graphic.js",
  "@arcgis/core/layers/support/LabelClass.js",
  "@arcgis/core/geometry/operators/unionOperator.js",
  "@arcgis/core/identity/IdentityManager.js",
  "@arcgis/core/identity/OAuthInfo.js",
]);

// ─────────────────────────────────────────────────────────────────────────────
// PROPER CASE HELPER
// ─────────────────────────────────────────────────────────────────────────────
const LOWERCASE_EX = new Set(["a","an","and","at","but","by","for","in","nor","of","on","or","so","the","to","up","yet"]);
const UPPERCASE_EX = new Set(["ii","iii","iv","vi","vii","viii","ne","nw","se","sw","us","sr","wa","llc","inc","ltd","lp","llp","fpd","ems","rfa","f.p.d.","f.p.d"]);

function properCase(str) {
  if (!str) return str;
  const words = str.toLowerCase().split(" ");
  const result = words.map((word, i) => {
    if (!word) return word;
    if (UPPERCASE_EX.has(word)) return word.toUpperCase();
    if (i > 0 && LOWERCASE_EX.has(word)) return word;
    return word.charAt(0).toUpperCase() + word.slice(1);
  });
  const last = result.length - 1;
  if (result[last]) result[last] = result[last].charAt(0).toUpperCase() + result[last].slice(1);
  return result.join(" ");
}

// ─────────────────────────────────────────────────────────────────────────────
// RENDERERS + LABEL CLASSES
// ─────────────────────────────────────────────────────────────────────────────

// FPD — very light dark-red fill, 1.5px outline (individual FPD boundaries)
const FPD_RENDERER = {
  type:   "simple",
  symbol: { type: "simple-fill", color: [139, 0, 0, 0.06], outline: { color: [139, 0, 0], width: 1.5 } },
};

// FPD labels — Roboto bold, dark red
const makeFPDLabelClass = (size = 10) => new LabelClass({
  labelExpressionInfo: { expression: `$feature.fpd_desc` },
  symbol: {
    type: "text", color: [168, 0, 0, 199], haloColor: [252, 250, 250], haloSize: 2,
    font: { family: "Avenir Next LT Pro", weight: "bold", size },
  },
  labelPlacement: "always-horizontal",
});

// Drive mile — unique-value by tobreak
const DRIVE_MILE_RENDERER = {
  type: "unique-value",
  field: "tobreak",
  uniqueValueInfos: [
    { value: 1.5, label: "1.5 mi", symbol: { type: "simple-fill", color: [237, 81,  81  ], outline: { color: [255,255,255], width: 0.5 } } },
    { value: 2.5, label: "2.5 mi", symbol: { type: "simple-fill", color: [20,  158, 206 ], outline: { color: [255,255,255], width: 0.5 } } },
    { value: 5,   label: "5 mi",   symbol: { type: "simple-fill", color: [148, 103, 189 ], outline: { color: [255,255,255], width: 0.5 } } },
    { value: 7,   label: "7 mi",   symbol: { type: "simple-fill", color: [240, 150, 50  ], outline: { color: [255,255,255], width: 0.5 } } },
  ],
};

// Stations — web-style fire-station symbol
const STATION_RENDERER = {
  type:   "simple",
  symbol: { type: "web-style", name: "fire-station", styleName: "Esri2DPointSymbolsStyle" },
};

// Station labels — Arial, offset above symbol; smaller for auto-aid
const makeStationLabelClass = (size = 11) => new LabelClass({
  labelExpressionInfo: { expression: `$feature["StationName"]` },
  symbol: {
    type: "text", color: [60, 60, 60], haloColor: [255, 255, 255], haloSize: 1.5,
    font: { family: "Avenir Next LT Pro", style: "normal", weight: "bold", size },
    xoffset: -8, yoffset: 11,
  },
  labelPlacement: "center-right",
});

// ─────────────────────────────────────────────────────────────────────────────
// OAUTH
// ─────────────────────────────────────────────────────────────────────────────
const oauthInfo = new OAuthInfo({ appId: AGOL_CLIENT_ID, portalUrl: AGOL_PORTAL, popup: false });
esriId.registerOAuthInfos([oauthInfo]);

// ─────────────────────────────────────────────────────────────────────────────
// SOURCE ATOMS
// ─────────────────────────────────────────────────────────────────────────────
const $selection      = atom({ stationId: null, label: "", district: "", address: "" });
const $agencyContext  = atom(null);
const $agencySnapshot = atom(null);

// ─────────────────────────────────────────────────────────────────────────────
// COMPUTED STORES
// ─────────────────────────────────────────────────────────────────────────────
const $mode = computed($selection, sel => sel.stationId === null ? "home" : "station");

const $breadcrumb = computed([$agencyContext, $selection], (ctx, sel) => {
  if (!ctx) return [];
  const crumbs = [{ label: ctx.agencyName, action: sel.stationId ? () => SelectionService.clearSelection() : null }];
  if (sel.stationId) crumbs.push({ label: sel.label || sel.stationId, action: null });
  return crumbs;
});

// ─────────────────────────────────────────────────────────────────────────────
// AGENCY SERVICE
// ─────────────────────────────────────────────────────────────────────────────
async function resolveAgency(portalUsername) {
  log(`AgencyService: resolving "${portalUsername}"`, "state");

  // Step 1: username → fire_prote
  const usernamesTable = new FeatureLayer({ portalItem: { id: USERNAMES_ITEM_ID } });
  const userResult = await usernamesTable.queryFeatures({
    where: `portal_user = '${portalUsername}'`,
    outFields: ["portal_user", "fire_prote"], returnGeometry: false,
  });
  if (!userResult.features.length) throw new Error(`No agency found for portal user "${portalUsername}"`);

  const fire_prote = userResult.features[0].attributes["fire_prote"];
  log(`AgencyService: fire_prote = "${fire_prote}"`, "state");

  // Step 2: fire_prote → FPD_CODEs + unioned geometry (for agency boundary)
  const fpdQueryLayer = new FeatureLayer({ url: FPD_URL });
  const fpdResult = await fpdQueryLayer.queryFeatures({
    where: `fire_prote = ${sqlQuote(fire_prote)}`,
    outFields: ["FPD_CODE"], returnGeometry: true,
    outSpatialReference: { wkid: 102100 },
  });
  if (!fpdResult.features.length) throw new Error(`No FPD_CODEs found for agency "${fire_prote}"`);

  const fpdCodes = fpdResult.features.map(f => f.attributes["FPD_CODE"]);
  log(`AgencyService: FPD_CODEs = [${fpdCodes.join(", ")}]`, "state");

  // Union FPD geometries → single agency boundary polygon
  let agencyGeometry = null;
  try {
    const geometries = fpdResult.features.map(f => f.geometry);
    agencyGeometry = geometries.length === 1
      ? geometries[0]
      : unionOperator.executeMany(geometries);
    log(`AgencyService: agency boundary computed`, "state");
  } catch(e) {
    log(`AgencyService: geometry union failed — ${e.message}`, "side");
  }

  // Step 3: build definition expressions
  const inList           = fpdCodes.map(c => `'${c}'`).join(", ");
  const defExpression    = `DIST1 IN (${inList})`;
  const fpdDefExpression = `fire_prote = ${sqlQuote(fire_prote)}`;

  // Auto-aid: stations whose DIST2-24 contain agency FPD codes but DIST1 does not
  const distClause  = fpdCodes.length === 1 ? `= '${fpdCodes[0]}'` : `IN (${inList})`;
  const autoAidExpr = `(${
    Array.from({ length: 23 }, (_, i) => `DIST${i + 2} ${distClause}`).join(" OR ")
  }) AND DIST1 NOT IN (${inList})`;

  log(`AgencyService: defExpression = "${defExpression}"`, "state");

  return {
    agencyName: properCase(fire_prote),
    fire_prote, portalUsername, fpdCodes,
    defExpression, fpdDefExpression, autoAidExpr, agencyGeometry,
  };
}

// ─────────────────────────────────────────────────────────────────────────────
// MAP SERVICE
// ─────────────────────────────────────────────────────────────────────────────
const MapService = (() => {
  let _view = null, _stationsLayer = null, _highlight = null;

  function init(view, stationsLayer) {
    _view = view; _stationsLayer = stationsLayer;

    _view.on("click", async (event) => {
      const hitResult = await _view.hitTest(event, { include: [_stationsLayer], tolerance: 6 });
      const stationHit = hitResult.results.find(r => r.layer === _stationsLayer);
      if (!stationHit) {
        if (!hitResult.results.length) SelectionService.clearSelection();
        return;
      }
      const oidField = _stationsLayer.objectIdField || "OBJECTID";
      const oid      = stationHit.graphic.attributes[oidField];
      try {
        const result = await _stationsLayer.queryFeatures({
          objectIds: [oid], outFields: ["Station", "StationName", "FIRE_DISTRICT", "StationAddress"], returnGeometry: false,
        });
        const attrs     = result.features[0]?.attributes;
        const stationId = attrs?.["Station"];
        log(`hit: Station="${stationId}"`, "action");
        SelectionService.selectStation(stationId, "map", {
          label:    attrs?.["StationName"] || stationId,
          district: attrs?.["FIRE_DISTRICT"] || "",
          address:  attrs?.["StationAddress"] || "",
        });
      } catch(e) { log(`hit: query failed: ${e.message}`, "side"); }
    });

    log("MapService ready", "state");
  }

  async function goToStation(stationId) {
    if (!_view || !_stationsLayer) return;
    try {
      const r = await _stationsLayer.queryFeatures({ where: `Station = '${stationId}'`, returnGeometry: true, outFields: ["Station"] });
      if (r.features.length) await _view.goTo({ target: r.features[0].geometry, zoom: 14 });
    } catch(e) { log(`goTo failed: ${e.message}`, "side"); }
  }

  async function highlightStation(stationId) {
    if (!_view || !_stationsLayer) return;
    clearHighlight();
    try {
      const lv = await _view.whenLayerView(_stationsLayer);
      const r  = await _stationsLayer.queryFeatures({ where: `Station = '${stationId}'`, returnGeometry: false, outFields: ["OBJECTID"] });
      if (r.features.length) _highlight = lv.highlight(r.features);
    } catch(e) { log(`highlight failed: ${e.message}`, "side"); }
  }

  function clearHighlight() { if (_highlight) { _highlight.remove(); _highlight = null; } }
  return { init, goToStation, highlightStation, clearHighlight };
})();

// ─────────────────────────────────────────────────────────────────────────────
// SELECTION SERVICE
// ─────────────────────────────────────────────────────────────────────────────
const SelectionService = {
  selectStation(stationId, source = "map", display = {}) {
    log(`selectStation("${stationId}", source="${source}")`, "action");
    $selection.set({ stationId, label: display.label || stationId, district: display.district || "", address: display.address || "" });
    MapService.highlightStation(stationId);
    if (source === "search" || source === "list") MapService.goToStation(stationId);
  },
  clearSelection() {
    log("clearSelection()", "action");
    $selection.set({ stationId: null, label: "", district: "", address: "" });
    MapService.clearHighlight();
  },
};
window.SelectionService = SelectionService;
window.handleStationClick = (el) => {
  SelectionService.selectStation(
    el.dataset.id, "list",
    { label: el.dataset.label, district: el.dataset.district, address: el.dataset.address }
  );
};

// ─────────────────────────────────────────────────────────────────────────────
// STATION SERVICE
// ─────────────────────────────────────────────────────────────────────────────
const StationService = (() => {
  let _layer = null, _autoAidLayer = null;
  let _stations = [], _autoAidStations = [];

  function init(layer, autoAidLayer) {
    _layer = layer;
    _autoAidLayer = autoAidLayer;
  }

  async function loadAgencyStations(expr, autoAidExpr) {
    try {
      const r = await _layer.queryFeatures({
        where: expr || "1=1",
        outFields: ["Station","StationName","FIRE_DISTRICT","StationAddress"],
        returnGeometry: false,
      });
      const seen = new Set();
      const rawIds = r.features.map(f => f.attributes["Station"]);
      log(`StationService: raw Station IDs = ${JSON.stringify(rawIds)}`, "side");
      _stations = r.features
        .map(f => ({
          stationId: String(f.attributes["Station"]).trim(),
          label:     f.attributes["StationName"] || String(f.attributes["Station"]),
          district:  f.attributes["FIRE_DISTRICT"] || "",
          address:   f.attributes["StationAddress"] || "",
        }))
        .filter(s => { if (seen.has(s.stationId)) return false; seen.add(s.stationId); return true; });
      log(`StationService: ${_stations.length} primary stations loaded (deduped)`, "state");
    } catch(e) { log(`StationService primary failed: ${e.message}`, "side"); }

    try {
      const r = await _autoAidLayer.queryFeatures({
        where: autoAidExpr || "1=1",
        outFields: ["Station","StationName","FIRE_DISTRICT","StationAddress"],
        returnGeometry: false,
      });
      const seen2 = new Set();
      _autoAidStations = r.features
        .map(f => ({
          stationId: String(f.attributes["Station"]).trim(),
          label:     f.attributes["StationName"] || String(f.attributes["Station"]),
          district:  f.attributes["FIRE_DISTRICT"] || "",
          address:   f.attributes["StationAddress"] || "",
        }))
        .filter(s => { if (seen2.has(s.stationId)) return false; seen2.add(s.stationId); return true; });
      log(`StationService: ${_autoAidStations.length} auto-aid stations loaded (deduped)`, "state");
    } catch(e) { log(`StationService auto-aid failed: ${e.message}`, "side"); }
  }

  async function loadSnapshot() {
    $agencySnapshot.set({
      stationCount:  _stations.length,
      autoAidCount:  _autoAidStations.length,
    });
    log(`StationService: snapshot set (${_stations.length} primary, ${_autoAidStations.length} auto-aid, deduped)`, "state");
  }

  function getStations()        { return _stations; }
  function getAutoAidStations() { return _autoAidStations; }
  return { init, loadAgencyStations, loadSnapshot, getStations, getAutoAidStations };
})();

// ─────────────────────────────────────────────────────────────────────────────
// RENDERING
// ─────────────────────────────────────────────────────────────────────────────
function renderRibbon() {
  const ribbon = document.getElementById("ribbon");
  const crumbs = $breadcrumb.get();
  const mode   = $mode.get();
  const badge  = `<span class="mode-badge ${mode}">${mode === "home" ? "HOME" : "STATION"}</span>`;
  if (!crumbs.length) { ribbon.innerHTML = `<span style="color:var(--fph-text-muted);font-size:0.75rem">Authenticating…</span>${badge}`; return; }
  const parts = crumbs.map((c, i) => {
    const sep    = i > 0 ? `<span class="ribbon-sep">›</span>` : "";
    const isLast = i === crumbs.length - 1;
    if (isLast || !c.action) return `${sep}<span class="ribbon-crumb"><button class="active" disabled>${c.label}</button></span>`;
    return `${sep}<span class="ribbon-crumb"><button onclick="SelectionService.clearSelection()">${c.label}</button></span>`;
  }).join("");
  ribbon.innerHTML = parts + badge;
}

let _renderCount = 0;
function renderCardStack() {
  _renderCount++;
  log(`renderCardStack #${_renderCount} mode=${$mode.get()}`, "side");
  const right = document.getElementById("right-panel");
  const mode  = $mode.get();
  const ctx   = $agencyContext.get();
  const snap  = $agencySnapshot.get();
  const sel   = $selection.get();

  if (!ctx) { right.innerHTML = `<div style="padding:1rem;font-size:0.8rem;color:var(--fph-text-muted)">Authenticating…</div>`; return; }

  if (mode === "home") {
    right.innerHTML = agencyCardExpanded(ctx, snap);
  } else {
    const station = { stationId: sel.stationId, label: sel.label || sel.stationId, district: sel.district || "", address: sel.address || "" };
    right.innerHTML = agencyCardCollapsed(ctx) + stationCard(station) + relatedAssetsList(station);
  }
}

function agencyCardExpanded(ctx, snap) {
  const stations     = StationService.getStations();
  const autoAid      = StationService.getAutoAidStations();
  log(`agencyCardExpanded: ${stations.length} stations, ${autoAid.length} auto-aid`, "side");

  const stationList = (list, section) => !list.length ? "" : `
    <div class="section-label" style="margin-top:0.9rem">${section}</div>
    <ul class="asset-list">
      ${list.map(s => `
        <li class="asset-item" style="cursor:pointer"
            data-id="${s.stationId}"
            data-label="${s.label.replace(/"/g, '&quot;')}"
            data-district="${s.district.replace(/"/g, '&quot;')}"
            data-address="${s.address.replace(/"/g, '&quot;')}"
            onclick="handleStationClick(this)">
          <span class="ai-name">${s.label}</span>
          <span class="ai-count" style="font-size:0.65rem">${s.district}</span>
        </li>`).join("")}
    </ul>`;

  return `
    <div class="card expanded">
      <div class="card-header">
        <div class="card-icon icon-agency">🏛️</div>
        <div class="card-title-group">
          <div class="card-title">${ctx.agencyName}</div>
          <div class="card-subtitle">${ctx.portalUsername}</div>
        </div>
      </div>
      <div class="card-body">
        ${snap ? `
        <div class="data-grid" style="margin-top:0.5rem">
          <div class="data-item">
            <div class="di-val">${snap.stationCount}</div>
            <div class="di-label">Agency Stations</div>
          </div>
          <div class="data-item">
            <div class="di-val">${snap.autoAidCount ?? "—"}</div>
            <div class="di-label">Auto Aid Stations</div>
          </div>
        </div>` : `<p style="font-size:0.75rem;color:var(--fph-text-muted);margin-top:0.5rem">Loading data…</p>`}
        ${stationList(stations, "Stations")}
        ${stationList(autoAid, "Auto Aid Stations")}
      </div>
    </div>`;
}

function agencyCardCollapsed(ctx) {
  return `
    <div class="card collapsed-strip">
      <div class="card-header" onclick="SelectionService.clearSelection()">
        <div class="card-icon icon-agency">🏛️</div>
        <div class="card-title-group"><div class="card-title">${ctx.agencyName}</div></div>
        <span style="font-size:0.65rem;color:var(--fph-text-muted)">↩ home</span>
      </div>
    </div>`;
}

function stationCard(station) {
  return `
    <div class="card expanded">
      <div class="card-header">
        <div class="card-icon icon-station">🚒</div>
        <div class="card-title-group">
          <div class="card-title">${station.label}</div>
          <div class="card-subtitle">${station.district}</div>
        </div>
      </div>
      <div class="card-body">
        ${station.address ? `
        <div class="data-item" style="margin-top:0.5rem">
          <div class="di-label">Address</div>
          <div style="font-size:0.78rem;color:var(--fph-text);margin-top:0.2rem">${properCase(station.address)}</div>
        </div>` : ""}
        <p style="font-size:0.65rem;color:var(--fph-text-muted);margin-top:0.75rem">
          Detail queries (hydrants, drive miles, apparatus) — future task
        </p>
      </div>
    </div>`;
}

function relatedAssetsList(station) {
  return `
    <div class="card expanded">
      <div class="card-header">
        <div class="card-icon icon-assets">⬡</div>
        <div class="card-title-group">
          <div class="card-title">Related Assets</div>
          <div class="card-subtitle">for ${station.label}</div>
        </div>
      </div>
      <div class="card-body">
        <ul class="asset-list">
          <li class="asset-item"><span class="ai-name">Hydrant buffers</span><span class="ai-count">—</span></li>
          <li class="asset-item" style="opacity:0.55"><span class="ai-name">Drive-mile polygons</span><span class="ai-count">—</span></li>
          <li class="asset-item" style="opacity:0.35"><span class="ai-name">Apparatus / CP feed</span><span class="ai-count" style="color:#6450b4">v2 scope</span></li>
        </ul>
        <p style="font-size:0.62rem;color:var(--fph-text-muted);margin-top:0.6rem">
          Hydrant buffers: display-only — no stable key (regenerated monthly)
        </p>
      </div>
    </div>`;
}

// ─────────────────────────────────────────────────────────────────────────────
// DEV LOG
// ─────────────────────────────────────────────────────────────────────────────
function log(msg, type = "") {
  const el = document.getElementById("log-body");
  const ts = new Date().toLocaleTimeString("en-US", { hour12: false });
  const d  = document.createElement("div");
  d.className = `log-entry ${type}`; d.textContent = `${ts}  ${msg}`;
  el.prepend(d);
}
window.toggleLog = () => { const b = document.getElementById("log-body"); b.style.display = b.style.display === "none" ? "" : "none"; };
window.clearLog  = () => { document.getElementById("log-body").innerHTML = ""; };

// ─────────────────────────────────────────────────────────────────────────────
// SUBSCRIPTIONS
// ─────────────────────────────────────────────────────────────────────────────
$breadcrumb.subscribe(renderRibbon);
$mode.subscribe(renderCardStack);
$agencyContext.subscribe(renderCardStack);

// ─────────────────────────────────────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────────────────────────────────────
renderRibbon();
renderCardStack();

// ── Layers (1=2 until login resolves — prevents statewide flash) ──────────
const agencyBoundaryLayer = new GraphicsLayer({
  title:    "Agency Boundary",
  listMode: "show",
});

const fpdLayer = new FeatureLayer({
  url:                  FPD_URL,
  title:                "FPD Boundaries",
  definitionExpression: "1=2",
  outFields:            ["FPD_CODE", "fire_prote", "fpd_desc"],
  labelsVisible:        true,
  labelingInfo:         [makeFPDLabelClass(12)],
  renderer:             FPD_RENDERER,
  popupEnabled:         false,
});

const stationsLayer = new FeatureLayer({
  url:                  STATIONS_URL,
  title:                "Fire Stations",
  definitionExpression: "1=2",
  outFields:            ["Station", "StationName", "DIST1", "FIRE_DISTRICT"],
  labelsVisible:        true,
  labelingInfo:         [makeStationLabelClass(11)],
  renderer:             STATION_RENDERER,
  popupEnabled:         false,
});

const autoAidLayer = new FeatureLayer({
  url:                  STATIONS_URL,
  title:                "Auto Aid Stations",
  definitionExpression: "1=2",
  outFields:            ["Station", "StationName", "DIST1", "FIRE_DISTRICT"],
  labelsVisible:        true,
  labelingInfo:         [makeStationLabelClass(9)],
  opacity:              0.5,
  renderer:             STATION_RENDERER,
  popupEnabled:         false,
});

const hydrantBufLayer = new FeatureLayer({
  url:          HYDRANT_BUF_URL,
  title:        "Hydrant Buffers (1000 ft)",
  visible:      false,
  minScale:     150000,
  opacity:      0.32,
  popupEnabled: false,
  renderer: {
    type:   "simple",
    symbol: {
      type:    "simple-fill",
      color:   [197, 225, 240],
      outline: { color: [0, 40, 100], width: 2 },
    },
  },
});

const driveMiLayer = new FeatureLayer({
  url:                  DRIVE_MILE_URL,
  title:                "Drive Mile Coverage",
  definitionExpression: "1=2",
  outFields:            ["Station", "DIST1", "tobreak"],
  opacity:              0.5,
  renderer:             DRIVE_MILE_RENDERER,
  popupEnabled:         false,
});

// ── Wire map via arcgis-map web component event ───────────────────────────
const mapEl = document.getElementById("the-map");

mapEl.addEventListener("arcgisViewReadyChange", async () => {
  const view = mapEl.view;

  // Layer draw order (bottom → top): hydrant buffers, drive miles, FPD, agency boundary, auto-aid, stations
  view.map.addMany([hydrantBufLayer, driveMiLayer, fpdLayer, agencyBoundaryLayer, autoAidLayer, stationsLayer]);

  MapService.init(view, stationsLayer);
  StationService.init(stationsLayer, autoAidLayer);

  log("View ready", "state");

  try {
    const cred = await esriId.checkSignInStatus(AGOL_PORTAL + "sharing")
      .catch(() => esriId.getCredential(AGOL_PORTAL + "sharing"));

    const portalUsername = cred.userId;
    log(`OAuth: signed in as "${portalUsername}"`, "state");

    const ctx = await resolveAgency(portalUsername);

    // Apply definition expressions
    fpdLayer.definitionExpression         = ctx.fpdDefExpression;
    stationsLayer.definitionExpression    = ctx.defExpression;
    autoAidLayer.definitionExpression     = ctx.autoAidExpr;
    driveMiLayer.definitionExpression     = ctx.defExpression;

    // Hydrant buffers — spatial filter using agency boundary geometry
    // No field-based filter available; geometry intersection scopes to agency area
    if (ctx.agencyGeometry) {
      hydrantBufLayer.geometryDefinition = ctx.agencyGeometry;
    }

    // Draw agency boundary (thick dark-red outline, no fill — Option B)
    if (ctx.agencyGeometry) {
      agencyBoundaryLayer.add(new Graphic({
        geometry: ctx.agencyGeometry,
        symbol: { type: "simple-fill", color: [0, 0, 0, 0], outline: { color: [139, 0, 0, 200], width: 2.5 } },
      }));
    }

    // Zoom to agency extent
    const extentResult = await stationsLayer.queryExtent({ where: ctx.defExpression });
    if (extentResult.extent) await view.goTo(extentResult.extent.expand(1.5));

    // Set context atom → triggers ribbon + card stack render
    $agencyContext.set(ctx);
    log(`$agencyContext set for "${ctx.agencyName}"`, "state");

    // Load station list + snapshot
    await StationService.loadAgencyStations(ctx.defExpression, ctx.autoAidExpr);
    await StationService.loadSnapshot();
    renderCardStack();  // single render after all data is ready

    log("App ready", "state");

  } catch(e) {
    log(`Login failed: ${e.message}`, "side");
    document.getElementById("right-panel").innerHTML =
      `<div style="padding:1rem;font-size:0.8rem;color:var(--fph-text-muted)">Login failed: ${e.message}</div>`;
  }
});
</script>
</body>
</html>
