<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FireProtectionHub v2</title>

  <!-- ArcGIS Maps SDK for JavaScript (4.29 / Maps SDK 5.1) -->
  <link rel="stylesheet" href="https://js.arcgis.com/4.29/esri/themes/dark/main.css" />
  <script src="https://js.arcgis.com/4.29/"></script>

  <!-- Calcite Design System -->
  <script type="module" src="https://js.arcgis.com/calcite-components/3.0.3/calcite.esm.js"></script>
  <link rel="stylesheet" href="https://js.arcgis.com/calcite-components/3.0.3/calcite.css" />

  <!-- nanostores — inlined to avoid CDN/module timing issues -->
  <script>
  (function(global) {
    // Minimal nanostores: atom + computed
    function atom(initial) {
      let value = initial;
      const listeners = [];
      const store = {
        get() { return value; },
        set(next) {
          value = next;
          listeners.forEach(fn => fn(value));
        },
        subscribe(fn) {
          listeners.push(fn);
          fn(value);
          return () => { const i = listeners.indexOf(fn); if (i > -1) listeners.splice(i, 1); };
        }
      };
      return store;
    }

    function computed(deps, fn) {
      const sources = Array.isArray(deps) ? deps : [deps];
      let value = fn(...sources.map(s => s.get()));
      const listeners = [];
      const recompute = () => {
        value = fn(...sources.map(s => s.get()));
        listeners.forEach(f => f(value));
      };
      sources.forEach(s => s.subscribe(() => recompute()));
      return {
        get() { return value; },
        subscribe(fn) {
          listeners.push(fn);
          fn(value);
          return () => { const i = listeners.indexOf(fn); if (i > -1) listeners.splice(i, 1); };
        }
      };
    }

    global.nanostores = { atom, computed };
  })(window);
  </script>

  <style>
    :root {
      --fph-rail-width: 3.5rem;
      --fph-panel-width: 320px;
      --fph-right-width: 340px;
      --fph-ribbon-h: 2.5rem;
      --fph-bg: #1a1f2e;
      --fph-surface: #242938;
      --fph-surface2: #2d3347;
      --fph-border: rgba(255,255,255,0.09);
      --fph-accent: #e85d2f;
      --fph-accent2: #3b82f6;
      --fph-text: #e8eaf0;
      --fph-text-muted: #8891aa;
      --fph-tag-bg: rgba(59,130,246,0.15);
      --fph-tag-text: #93c5fd;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--fph-bg);
      color: var(--fph-text);
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Context Ribbon ──────────────────────────────────────────── */
    #ribbon {
      height: var(--fph-ribbon-h);
      background: var(--fph-surface);
      border-bottom: 1px solid var(--fph-border);
      display: flex;
      align-items: center;
      padding: 0 1rem;
      gap: 0;
      flex-shrink: 0;
      font-size: 0.78rem;
    }

    .ribbon-crumb {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      color: var(--fph-text-muted);
    }

    .ribbon-crumb button {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--fph-text-muted);
      font-size: 0.78rem;
      padding: 0.2rem 0.35rem;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
    }
    .ribbon-crumb button:hover { color: var(--fph-text); background: var(--fph-surface2); }
    .ribbon-crumb button.active { color: var(--fph-text); font-weight: 600; }
    .ribbon-crumb button:disabled { cursor: default; }

    .ribbon-sep {
      margin: 0 0.25rem;
      color: var(--fph-border);
      user-select: none;
      font-size: 0.9rem;
    }

    /* ── Shell body ──────────────────────────────────────────────── */
    #shell-body {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Action Rail ─────────────────────────────────────────────── */
    #action-rail {
      width: var(--fph-rail-width);
      background: var(--fph-surface);
      border-right: 1px solid var(--fph-border);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0.5rem 0;
      gap: 0.25rem;
      flex-shrink: 0;
      z-index: 10;
    }

    .rail-btn {
      width: 2.5rem;
      height: 2.5rem;
      border: none;
      background: none;
      cursor: pointer;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--fph-text-muted);
      font-size: 1.1rem;
      transition: color 0.15s, background 0.15s;
      position: relative;
    }
    .rail-btn:hover { color: var(--fph-text); background: var(--fph-surface2); }
    .rail-btn.active {
      color: var(--fph-accent);
      background: rgba(232,93,47,0.12);
    }
    .rail-btn title { display: none; }
    .rail-tooltip {
      position: absolute;
      left: calc(100% + 8px);
      top: 50%;
      transform: translateY(-50%);
      background: #0d1117;
      color: var(--fph-text);
      font-size: 0.72rem;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.1s;
      z-index: 100;
    }
    .rail-btn:hover .rail-tooltip { opacity: 1; }

    /* ── Left Panel ──────────────────────────────────────────────── */
    #left-panel {
      width: 0;
      overflow: hidden;
      background: var(--fph-surface);
      border-right: 1px solid var(--fph-border);
      transition: width 0.2s ease;
      flex-shrink: 0;
    }
    #left-panel.open { width: var(--fph-panel-width); }
    #left-panel-inner {
      width: var(--fph-panel-width);
      height: 100%;
      overflow-y: auto;
      padding: 1rem;
    }

    .panel-title {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--fph-text-muted);
      margin-bottom: 0.75rem;
    }

    /* ── Map Area ────────────────────────────────────────────────── */
    #map-area {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    /* ── Right Panel ─────────────────────────────────────────────── */
    #right-panel {
      width: var(--fph-right-width);
      background: var(--fph-surface);
      border-left: 1px solid var(--fph-border);
      overflow-y: auto;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
    }

    /* ── Cards ───────────────────────────────────────────────────── */
    .card {
      border-bottom: 1px solid var(--fph-border);
      overflow: hidden;
      transition: all 0.2s ease;
    }

    .card-header {
      display: flex;
      align-items: center;
      padding: 0.75rem 1rem;
      gap: 0.6rem;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }
    .card-header:hover { background: var(--fph-surface2); }

    .card-icon {
      width: 2rem;
      height: 2rem;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }
    .icon-agency { background: rgba(232,93,47,0.15); color: var(--fph-accent); }
    .icon-station { background: rgba(59,130,246,0.15); color: var(--fph-accent2); }
    .icon-assets { background: rgba(139,92,246,0.15); color: #a78bfa; }

    .card-title-group { flex: 1; min-width: 0; }
    .card-title { font-size: 0.82rem; font-weight: 600; color: var(--fph-text); }
    .card-subtitle { font-size: 0.7rem; color: var(--fph-text-muted); margin-top: 0.1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .card-chevron {
      font-size: 0.7rem;
      color: var(--fph-text-muted);
      transition: transform 0.2s;
    }
    .card.expanded .card-chevron { transform: rotate(180deg); }

    .card-body {
      display: none;
      padding: 0 1rem 1rem;
    }
    .card.expanded .card-body { display: block; }

    /* collapsed header strip */
    .card.collapsed-strip .card-header {
      padding: 0.4rem 0.75rem;
      background: var(--fph-surface2);
    }
    .card.collapsed-strip .card-title { font-size: 0.75rem; }
    .card.collapsed-strip .card-icon { width: 1.5rem; height: 1.5rem; font-size: 0.8rem; }

    /* ── Data rows ───────────────────────────────────────────────── */
    .data-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }

    .data-item {
      background: var(--fph-surface2);
      border-radius: 6px;
      padding: 0.5rem 0.65rem;
    }
    .data-item .di-val {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--fph-text);
      line-height: 1;
    }
    .data-item .di-label {
      font-size: 0.65rem;
      color: var(--fph-text-muted);
      margin-top: 0.2rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
      margin-top: 0.6rem;
    }
    .tag {
      font-size: 0.67rem;
      padding: 0.15rem 0.5rem;
      border-radius: 12px;
      background: var(--fph-tag-bg);
      color: var(--fph-tag-text);
      font-weight: 500;
    }

    .asset-list {
      list-style: none;
      margin-top: 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }
    .asset-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--fph-surface2);
      border-radius: 6px;
      padding: 0.45rem 0.65rem;
      font-size: 0.75rem;
    }
    .asset-item .ai-name { color: var(--fph-text); }
    .asset-item .ai-count {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--fph-text-muted);
      background: rgba(255,255,255,0.06);
      padding: 0.1rem 0.4rem;
      border-radius: 10px;
    }

    /* ── Log panel ───────────────────────────────────────────────── */
    #log-panel {
      position: fixed;
      bottom: 0;
      right: var(--fph-right-width);
      width: 380px;
      background: #0d1117;
      border: 1px solid var(--fph-border);
      border-bottom: none;
      border-radius: 8px 8px 0 0;
      font-family: "JetBrains Mono", "Fira Code", monospace;
      font-size: 0.68rem;
      z-index: 50;
      overflow: hidden;
    }
    #log-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.35rem 0.75rem;
      background: var(--fph-surface2);
      cursor: pointer;
      user-select: none;
      font-size: 0.7rem;
      color: var(--fph-text-muted);
    }
    #log-header .log-title { font-weight: 600; color: var(--fph-text); }
    #log-body { height: 140px; overflow-y: auto; padding: 0.5rem 0.75rem; display: flex; flex-direction: column-reverse; }
    .log-entry { padding: 0.15rem 0; color: #6ee7b7; line-height: 1.4; }
    .log-entry.action { color: #93c5fd; }
    .log-entry.state { color: #fcd34d; }
    .log-entry.side { color: #a78bfa; }
    .log-entry.stub { color: var(--fph-text-muted); font-style: italic; }

    .clear-log { font-size: 0.65rem; color: var(--fph-text-muted); cursor: pointer; }
    .clear-log:hover { color: var(--fph-text); }

    /* ── Search stub in panel ────────────────────────────────────── */
    .search-input {
      width: 100%;
      background: var(--fph-surface2);
      border: 1px solid var(--fph-border);
      border-radius: 6px;
      color: var(--fph-text);
      font-size: 0.8rem;
      padding: 0.5rem 0.75rem;
      outline: none;
      margin-bottom: 0.75rem;
    }
    .search-input:focus { border-color: var(--fph-accent2); }
    ::placeholder { color: var(--fph-text-muted); }

    .search-result {
      padding: 0.5rem 0.6rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.78rem;
      color: var(--fph-text);
      transition: background 0.12s;
    }
    .search-result:hover { background: var(--fph-surface2); }
    .search-result .sr-id { font-size: 0.67rem; color: var(--fph-text-muted); }

    /* ── Misc ────────────────────────────────────────────────────── */
    .section-label {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--fph-text-muted);
      margin: 0.75rem 0 0.35rem;
    }

    .mode-badge {
      font-size: 0.62rem;
      padding: 0.1rem 0.45rem;
      border-radius: 10px;
      font-weight: 600;
      letter-spacing: 0.04em;
      background: rgba(232,93,47,0.15);
      color: var(--fph-accent);
      margin-left: auto;
    }
    .mode-badge.home { background: rgba(16,185,129,0.12); color: #34d399; }
  </style>
</head>
<body>

  <!-- Context Ribbon -->
  <div id="ribbon">
    <!-- populated by renderRibbon() -->
  </div>

  <div id="shell-body">

    <!-- Action Rail -->
    <nav id="action-rail">
      <button class="rail-btn" data-panel="search" onclick="SelectionService.setPanel('search')">
        🔍<span class="rail-tooltip">Search</span>
      </button>
      <button class="rail-btn" data-panel="layers" onclick="SelectionService.setPanel('layers')">
        ⊞<span class="rail-tooltip">Layers</span>
      </button>
      <button class="rail-btn" data-panel="legend" onclick="SelectionService.setPanel('legend')">
        ≡<span class="rail-tooltip">Legend</span>
      </button>
      <button class="rail-btn" data-panel="reports" onclick="SelectionService.setPanel('reports')">
        📄<span class="rail-tooltip">Reports</span>
      </button>
    </nav>

    <!-- Left Panel -->
    <div id="left-panel">
      <div id="left-panel-inner" id="left-panel-content">
        <!-- populated by renderLeftPanel() -->
      </div>
    </div>

    <!-- Map Area -->
    <main id="map-area">
      <arcgis-map id="the-map" item-id="" style="width:100%;height:100%">
        <arcgis-zoom position="top-left"></arcgis-zoom>
      </arcgis-map>
    </main>

    <!-- Right Card Stack -->
    <aside id="right-panel">
      <!-- populated by renderCardStack() -->
    </aside>

  </div>

  <!-- Dev Log -->
  <div id="log-panel">
    <div id="log-header" onclick="toggleLog()">
      <span class="log-title">Action Log</span>
      <span class="clear-log" onclick="event.stopPropagation(); clearLog()">clear</span>
    </div>
    <div id="log-body"></div>
  </div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// nanostores — from inline implementation above
// ─────────────────────────────────────────────────────────────────────────────
const { atom, computed } = window.nanostores;

// ─────────────────────────────────────────────────────────────────────────────
// LAYER URLs
// ─────────────────────────────────────────────────────────────────────────────
const AGOL_CLIENT_ID = "tS3sgaCh7cedVjCu";
const AGOL_PORTAL   = "https://wsrb.maps.arcgis.com/";
const STATIONS_URL   = "https://services8.arcgis.com/e0kWqyF74glFc4lT/arcgis/rest/services/Fire_Stations/FeatureServer/0";
const DRIVE_MILE_URL = "https://services8.arcgis.com/e0kWqyF74glFc4lT/arcgis/rest/services/Drive_Mile_Disks/FeatureServer/1";

// ─────────────────────────────────────────────────────────────────────────────
// MOCK AGENCY DATA — replace with real OAuth lookup when wiring login
// ─────────────────────────────────────────────────────────────────────────────
const MOCK_AGENCY = {
  agencyName:     "King County Fire District 45",
  fdid:           "WA-4-03045",
  agencyCode:     "KCF45",
  portalUsername: "chief.johnson@kcfd45.wa.gov",
  defExpression:  "FIRE_PROTE = 'KING COUNTY FIRE DISTRICT 45'",
};

// ─────────────────────────────────────────────────────────────────────────────
// SOURCE ATOMS
// ─────────────────────────────────────────────────────────────────────────────

/** { stationId: string | null } — stable STATION key, never OBJECTID */
const $selection = atom({ stationId: null });

/** Set once after OAuth resolves; read-only after */
const $agencyContext = atom(null);

/** UI-only — selection logic must never read this */
const $panelState = atom({ openRailPanel: null });

/** Session-cached home-state counts. Cache, not truth. */
const $agencySnapshot = atom(null);

// ─────────────────────────────────────────────────────────────────────────────
// COMPUTED STORES
// ─────────────────────────────────────────────────────────────────────────────

/** 'home' | 'station' — derived from $selection only */
const $mode = computed($selection, sel =>
  sel.stationId === null ? "home" : "station"
);

/** Ordered ribbon entries — derived from $agencyContext + $selection */
const $breadcrumb = computed([$agencyContext, $selection], (ctx, sel) => {
  if (!ctx) return [];
  const crumbs = [{
    label: ctx.agencyName,
    action: sel.stationId ? () => SelectionService.clearSelection() : null,
  }];
  if (sel.stationId) {
    crumbs.push({ label: sel.stationId, action: null });
  }
  return crumbs;
});

// ─────────────────────────────────────────────────────────────────────────────
// MAP SERVICE — owns the view, layers, hit test, highlight, goTo
// ─────────────────────────────────────────────────────────────────────────────
const MapService = (() => {
  let _view          = null;
  let _stationsLayer = null;
  let _driveMiLayer  = null;
  let _highlight     = null;   // current highlight handle

  function init(view, stationsLayer, driveMiLayer) {
    _view          = view;
    _stationsLayer = stationsLayer;
    _driveMiLayer  = driveMiLayer;

    // Wire map click → SelectionService (Task 2 deliverable)
    _view.on("click", async (event) => {
      const hitResult = await _view.hitTest(event, {
        include: [_stationsLayer, _driveMiLayer],
      });

      if (!hitResult.results.length) {
        // Empty click — clear selection
        SelectionService.clearSelection();
        return;
      }

      // ── Explicit layer priority ───────────────────────────────────
      // 1. Station point wins if present anywhere in the hit results
      const stationHit = hitResult.results.find(
        r => r.layer === _stationsLayer
      );
      if (stationHit) {
        const stationId = stationHit.graphic.attributes["STATION"];
        log(`hit: station layer → STATION="${stationId}"`, "action");
        SelectionService.selectStation(stationId, "map");
        return;
      }

      // 2. Drive-mile polygon — resolve via STATION key (proxy)
      const driveMiHit = hitResult.results.find(
        r => r.layer === _driveMiLayer
      );
      if (driveMiHit) {
        const stationId = driveMiHit.graphic.attributes["STATION"];
        log(`hit: drive-mile layer → proxying STATION="${stationId}"`, "action");
        SelectionService.selectStation(stationId, "map");
        return;
      }

      // 3. Anything else (hydrant buffer, etc.) — fall through, do nothing
      log("hit: non-selectable layer — ignoring", "side");
    });

    log("MapService ready — hit test wired", "state");
  }

  /** Zoom to a station point feature by STATION key */
  async function goToStation(stationId) {
    if (!_view || !_stationsLayer) return;
    try {
      const result = await _stationsLayer.queryFeatures({
        where: `STATION = '${stationId}'`,
        returnGeometry: true,
        outFields: ["STATION"],
      });
      if (result.features.length) {
        await _view.goTo({ target: result.features[0].geometry, zoom: 14 });
        log(`goTo: zoomed to ${stationId}`, "side");
      }
    } catch (e) {
      log(`goTo failed for ${stationId}: ${e.message}`, "side");
    }
  }

  /** Highlight a station feature by STATION key; clears previous */
  async function highlightStation(stationId) {
    if (!_view || !_stationsLayer) return;
    clearHighlight();
    try {
      const layerView = await _view.whenLayerView(_stationsLayer);
      const result = await _stationsLayer.queryFeatures({
        where: `STATION = '${stationId}'`,
        returnGeometry: false,
        outFields: ["OBJECTID"],
      });
      if (result.features.length) {
        _highlight = layerView.highlight(result.features);
        log(`highlight: applied to ${stationId}`, "side");
      }
    } catch (e) {
      log(`highlight failed for ${stationId}: ${e.message}`, "side");
    }
  }

  function clearHighlight() {
    if (_highlight) { _highlight.remove(); _highlight = null; }
  }

  return { init, goToStation, highlightStation, clearHighlight };
})();

// ─────────────────────────────────────────────────────────────────────────────
// SELECTION SERVICE — sole writer of atoms; components never set directly
// ─────────────────────────────────────────────────────────────────────────────
const SelectionService = (() => {

  /**
   * selectStation(stationId, source)
   * source: 'map' | 'search' | 'list' | 'ribbon'
   * map       → highlight only, no re-zoom (feature already visible)
   * search/list → highlight + goTo
   * ribbon    → highlight only
   */
  function selectStation(stationId, source = "map") {
    log(`selectStation("${stationId}", source="${source}")`, "action");
    $selection.set({ stationId });

    MapService.highlightStation(stationId);

    if (source === "search" || source === "list") {
      MapService.goToStation(stationId);
    }

    log(`$selection → ${JSON.stringify($selection.get())}`, "state");
  }

  /** Return to home mode */
  function clearSelection() {
    log("clearSelection()", "action");
    $selection.set({ stationId: null });
    MapService.clearHighlight();
    log(`$selection → ${JSON.stringify($selection.get())}`, "state");
  }

  /** Toggle rail panel — UI-only, never read by selection logic */
  function setPanel(panelId) {
    const current = $panelState.get().openRailPanel;
    const next = current === panelId ? null : panelId;
    log(`setPanel("${panelId}") → ${next}`, "action");
    $panelState.set({ openRailPanel: next });
  }

  return { selectStation, clearSelection, setPanel };
})();

window.SelectionService = SelectionService;

// ─────────────────────────────────────────────────────────────────────────────
// STATION SERVICE — loads layer data for cards and snapshot
// ─────────────────────────────────────────────────────────────────────────────
const StationService = (() => {
  let _stationsLayer = null;
  let _stations      = [];   // in-memory list for search panel

  function init(stationsLayer) {
    _stationsLayer = stationsLayer;
  }

  async function loadAgencyStations(defExpression) {
    if (!_stationsLayer) return [];
    try {
      const result = await _stationsLayer.queryFeatures({
        where: defExpression || "1=1",
        outFields: ["STATION", "STATION_NAME", "ADDRESS", "FIRE_PROTE"],
        returnGeometry: false,
        orderByFields: ["STATION"],
      });
      _stations = result.features.map(f => ({
        stationId: f.attributes["STATION"],
        label:     f.attributes["STATION_NAME"] || f.attributes["STATION"],
        address:   f.attributes["ADDRESS"] || "",
      }));
      log(`StationService: loaded ${_stations.length} stations`, "state");
      return _stations;
    } catch (e) {
      log(`StationService query failed: ${e.message}`, "side");
      return [];
    }
  }

  async function loadSnapshot(defExpression) {
    if (!_stationsLayer) return null;
    try {
      const count = await _stationsLayer.queryFeatureCount({
        where: defExpression || "1=1",
      });
      const snap = {
        stationCount: count,
        hydrantCount: "—",   // hydrant layer query added when layer is wired
        bufferCoverage: "—",
        loadedAt: new Date().toISOString(),
      };
      $agencySnapshot.set(snap);
      log(`StationService: snapshot set (${count} stations)`, "state");
      return snap;
    } catch (e) {
      log(`StationService snapshot failed: ${e.message}`, "side");
      return null;
    }
  }

  function getStations() { return _stations; }

  return { init, loadAgencyStations, loadSnapshot, getStations };
})();

// ─────────────────────────────────────────────────────────────────────────────
// RENDERING

function renderRibbon() {
  const ribbon = document.getElementById("ribbon");
  const crumbs = $breadcrumb.get();
  const mode   = $mode.get();
  const badge  = `<span class="mode-badge ${mode}">${mode === "home" ? "HOME" : "STATION"}</span>`;

  if (!crumbs.length) {
    ribbon.innerHTML = `<span style="color:var(--fph-text-muted);font-size:0.75rem">Authenticating…</span>${badge}`;
    return;
  }

  const parts = crumbs.map((c, i) => {
    const sep = i > 0 ? `<span class="ribbon-sep">›</span>` : "";
    const isLast = i === crumbs.length - 1;
    if (isLast || !c.action) {
      return `${sep}<span class="ribbon-crumb"><button class="active" disabled>${c.label}</button></span>`;
    }
    return `${sep}<span class="ribbon-crumb"><button onclick="SelectionService.clearSelection()">${c.label}</button></span>`;
  }).join("");

  ribbon.innerHTML = parts + badge;
}

function renderRailButtons() {
  const { openRailPanel } = $panelState.get();
  document.querySelectorAll(".rail-btn").forEach(btn =>
    btn.classList.toggle("active", btn.dataset.panel === openRailPanel)
  );
  document.getElementById("left-panel").classList.toggle("open", openRailPanel !== null);
}

function renderLeftPanel() {
  const { openRailPanel } = $panelState.get();
  const inner = document.getElementById("left-panel-inner");
  if (!openRailPanel) { inner.innerHTML = ""; return; }

  const titles = { search: "Search", layers: "Layers", legend: "Legend", reports: "Reports" };
  let content = `<p class="panel-title">${titles[openRailPanel]}</p>`;

  if (openRailPanel === "search") {
    content += `
      <input class="search-input" placeholder="Station name or ID…"
             oninput="handleSearchInput(this.value)" id="search-input" />
      <div id="search-results"></div>`;
  } else if (openRailPanel === "layers") {
    content += `
      <div style="display:flex;align-items:center;justify-content:space-between;padding:0.4rem 0;font-size:0.78rem;color:var(--fph-text-muted)">
        <span>● Fire Stations</span><span style="font-size:0.65rem">selectable</span>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;padding:0.4rem 0;font-size:0.78rem;color:var(--fph-text-muted)">
        <span>⬡ Drive Miles</span><span style="font-size:0.65rem">proxy → station</span>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;padding:0.4rem 0;font-size:0.78rem;color:var(--fph-text-muted)">
        <span>⬡ Hydrant Buffers</span><span style="font-size:0.65rem;color:#a78bfa">display-only</span>
      </div>`;
  } else if (openRailPanel === "legend") {
    content += `
      <div class="section-label">Stations</div>
      <div style="font-size:0.75rem;color:var(--fph-text-muted)">● Point — selectable</div>
      <div class="section-label" style="margin-top:0.75rem">Drive Miles</div>
      <div style="font-size:0.75rem;color:var(--fph-text-muted)">⬡ Polygon — proxy for station</div>
      <div class="section-label" style="margin-top:0.75rem">Hydrant Buffers</div>
      <div style="font-size:0.75rem;color:#a78bfa">⬡ Display-only — not selectable</div>`;
  } else if (openRailPanel === "reports") {
    content += `<div style="font-size:0.75rem;color:var(--fph-text-muted)">Report generation — future task</div>`;
  }

  inner.innerHTML = content;
  if (openRailPanel === "search") renderSearchResults("");
}

window.handleSearchInput = function(val) { renderSearchResults(val); };

function renderSearchResults(query) {
  const el = document.getElementById("search-results");
  if (!el) return;
  const stations = StationService.getStations();
  const q = query.trim().toLowerCase();
  const matches = q.length === 0
    ? stations
    : stations.filter(s =>
        s.label.toLowerCase().includes(q) ||
        s.stationId.toLowerCase().includes(q) ||
        s.address.toLowerCase().includes(q)
      );

  if (!matches.length) {
    el.innerHTML = `<p style="font-size:0.75rem;color:var(--fph-text-muted);padding:0.5rem 0">No stations match</p>`;
    return;
  }
  el.innerHTML = matches.map(s => `
    <div class="search-result" onclick="SelectionService.selectStation('${s.stationId}','search')">
      <div>${s.label}</div>
      <div class="sr-id">${s.stationId}${s.address ? " · " + s.address : ""}</div>
    </div>`).join("");
}

function renderCardStack() {
  const right = document.getElementById("right-panel");
  const mode  = $mode.get();
  const ctx   = $agencyContext.get();
  const snap  = $agencySnapshot.get();
  const sel   = $selection.get();

  if (!ctx) {
    right.innerHTML = `<div style="padding:1rem;font-size:0.8rem;color:var(--fph-text-muted)">Authenticating…</div>`;
    return;
  }

  if (mode === "home") {
    right.innerHTML = agencyCardExpanded(ctx, snap);
  } else {
    const stations = StationService.getStations();
    const station  = stations.find(s => s.stationId === sel.stationId)
                     || { stationId: sel.stationId, label: sel.stationId, address: "" };
    right.innerHTML = agencyCardCollapsed(ctx) + stationCard(station) + relatedAssetsList(station);
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// DEV LOG
// ─────────────────────────────────────────────────────────────────────────────
function log(msg, type = "") {
  const el = document.getElementById("log-body");
  const ts = new Date().toLocaleTimeString("en-US", { hour12: false });
  const div = document.createElement("div");
  div.className = `log-entry ${type}`;
  div.textContent = `${ts}  ${msg}`;
  el.prepend(div);
}

window.toggleLog = function() {
  const body = document.getElementById("log-body");
  body.style.display = body.style.display === "none" ? "" : "none";
};
window.clearLog = function() {
  document.getElementById("log-body").innerHTML = "";
};

// ─────────────────────────────────────────────────────────────────────────────
// SUBSCRIPTIONS
// ─────────────────────────────────────────────────────────────────────────────
$breadcrumb.subscribe(renderRibbon);
$mode.subscribe(renderCardStack);
$agencyContext.subscribe(renderCardStack);
$agencySnapshot.subscribe(renderCardStack);
$panelState.subscribe(() => { renderRailButtons(); renderLeftPanel(); });

// ─────────────────────────────────────────────────────────────────────────────
// BOOT — wire JSAPI via AMD require
// ─────────────────────────────────────────────────────────────────────────────
renderRibbon();
renderCardStack();

require([
  "esri/identity/OAuthInfo",
  "esri/identity/IdentityManager",
  "esri/layers/FeatureLayer",
  "esri/Map",
  "esri/views/MapView",
  "esri/widgets/Zoom",
], function(OAuthInfo, esriId, FeatureLayer, Map, MapView, Zoom) {

  // ── OAuth ─────────────────────────────────────────────────────────
  const oauthInfo = new OAuthInfo({
    appId: AGOL_CLIENT_ID,
    portalUrl: AGOL_PORTAL,
    popup: false,   // redirect flow
  });
  esriId.registerOAuthInfos([oauthInfo]);

  // Check for existing session, prompt login if none
  esriId.checkSignInStatus(AGOL_PORTAL + "sharing").catch(() => {
    esriId.getCredential(AGOL_PORTAL + "sharing");
  });

  // ── Layers ────────────────────────────────────────────────────────
  const stationsLayer = new FeatureLayer({
    url: STATIONS_URL,
    definitionExpression: MOCK_AGENCY.defExpression,
    outFields: ["*"],
  });

  const driveMiLayer = new FeatureLayer({
    url: DRIVE_MILE_URL,
    definitionExpression: MOCK_AGENCY.defExpression,
    outFields: ["STATION"],
  });

  // ── Map + View ────────────────────────────────────────────────────
  const map = new Map({
    basemap: "dark-gray-vector",
    layers: [driveMiLayer, stationsLayer],  // stations on top
  });

  const view = new MapView({
    container: "the-map",
    map,
    center: [-122.3, 47.5],   // WA default — goTo will navigate on first selection
    zoom: 10,
  });

  // ── Init services ─────────────────────────────────────────────────
  MapService.init(view, stationsLayer, driveMiLayer);
  StationService.init(stationsLayer);

  view.when(async () => {
    log("View ready", "state");

    // Set agency context (replace with real OAuth resolver)
    $agencyContext.set(MOCK_AGENCY);
    log("$agencyContext set (mock — replace with OAuth resolver)", "state");

    // Load station list + snapshot from real layer
    await StationService.loadAgencyStations(MOCK_AGENCY.defExpression);
    await StationService.loadSnapshot(MOCK_AGENCY.defExpression);

    // Re-render cards now that station list is populated
    renderCardStack();
    log("App ready", "state");
  });
});
</script>
